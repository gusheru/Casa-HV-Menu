<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Casa App – Menú & Tareas</title>
  <style>
:root{
  color-scheme:dark;
  --primary:#b47fff;
  --pl:#8b5cf6;
  --pbg:rgba(180,127,255,.1);
  --accent:#fb923c;
  --ad:#f87171;
  --acc:#b47fff;
  --bg:#0a0a0c;
  --card:#141416;
  --card2:#1c1c1f;
  --border:#252528;
  --border2:#333338;
  --text:#ececee;
  --muted:#606068;
  --sh:0 4px 24px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}
.screen{display:none;min-height:100dvh;flex-direction:column;}
.screen.active{display:flex;}

/* WELCOME */
#sw{background:radial-gradient(ellipse at 50% -5%,#1e0a3c 0%,#0a0a0c 65%);}
.sw-head{padding:max(56px,env(safe-area-inset-top,56px)) 24px 28px;text-align:center;}
.sw-logo{font-size:4.5rem;display:block;filter:drop-shadow(0 0 30px rgba(180,127,255,.35));}
.sw-title{color:#fff;font-size:2rem;font-weight:800;margin-top:12px;letter-spacing:-.03em;}
.sw-date{color:rgba(255,255,255,.3);font-size:.85rem;margin-top:6px;letter-spacing:.01em;}
.sw-body{flex:1;overflow-y:auto;padding:8px 16px 34px;-webkit-overflow-scrolling:touch;}
.fam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:12px;}
.fam-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:24px 14px 20px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.fam-card::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(180,127,255,.07),transparent 60%);pointer-events:none;}
.fam-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.fam-card:active{transform:scale(.97);}
.fam-emoji{font-size:3rem;display:block;filter:drop-shadow(0 2px 10px rgba(0,0,0,.4));}
.fam-name{color:var(--text);font-weight:700;font-size:.95rem;margin-top:10px;letter-spacing:-.01em;}
.fam-sub{color:var(--muted);font-size:.72rem;margin-top:3px;}
.add-fam-btn{width:100%;background:transparent;border:1.5px dashed var(--border2);border-radius:20px;padding:20px;color:var(--muted);font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.add-fam-btn:hover{border-color:var(--primary);color:var(--primary);}

/* PIN */
#sp{background:radial-gradient(ellipse at 50% -5%,#1e0a3c,#0a0a0c 70%);align-items:center;justify-content:center;padding:max(40px,env(safe-area-inset-top)) 24px max(28px,env(safe-area-inset-bottom)) 24px;gap:24px;}
.pin-back{align-self:flex-start;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);padding:8px 15px;border-radius:10px;cursor:pointer;font-size:.84rem;font-family:inherit;transition:all .2s;}
.pin-back:hover{border-color:var(--border2);color:var(--text);}
.pin-fam-badge{display:flex;align-items:center;gap:13px;}
.pin-fam-emoji{font-size:2.6rem;}
.pin-fam-name{color:var(--text);font-size:1.1rem;font-weight:700;letter-spacing:-.01em;}
.pin-box{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:30px 26px;width:100%;max-width:300px;display:flex;flex-direction:column;align-items:center;gap:22px;}
.pin-title{color:var(--muted);font-size:.88rem;font-weight:500;letter-spacing:.01em;}
.pin-dots{display:flex;gap:18px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .25s;}
.pin-dot.filled{background:var(--primary);border-color:var(--primary);box-shadow:0 0 14px rgba(180,127,255,.5);}
.pin-dot.error{background:#f87171;border-color:#f87171;box-shadow:0 0 14px rgba(248,113,113,.4);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
.pin-key{background:var(--card2);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:1.45rem;font-weight:600;padding:17px;cursor:pointer;transition:all .15s;font-family:inherit;}
.pin-key:active{background:var(--primary);border-color:var(--primary);transform:scale(.94);}
.pin-err{color:#f87171;font-size:.8rem;height:18px;text-align:center;}

/* COMMON HEADER */
.app-header{background:var(--card);border-bottom:1px solid var(--border);color:var(--text);padding:max(14px,env(safe-area-inset-top)) 16px 13px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.app-header h1{font-size:1rem;font-weight:700;line-height:1.2;letter-spacing:-.01em;}
.app-header p{font-size:.7rem;color:var(--muted);margin-top:1px;}
.hbtn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:9px;cursor:pointer;font-size:.78rem;font-weight:600;font-family:inherit;white-space:nowrap;transition:all .2s;}
.hbtn:hover{border-color:var(--primary);color:var(--primary);}

/* COCINERA */
#sc{background:var(--bg);}
.cook-body{flex:1;overflow-y:auto;padding:15px;-webkit-overflow-scrolling:touch;}
.today-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.today-title{font-size:1.35rem;font-weight:800;color:var(--text);letter-spacing:-.03em;}
.today-date{font-size:.8rem;color:var(--muted);}
.section-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:22px 0 10px;}
.meal-big{background:var(--card);border-radius:20px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.mbh{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;user-select:none;border-left:3px solid var(--border2);}
.mbh[data-mt=desayuno]{border-color:#fb923c;}
.mbh[data-mt=refaccion_m]{border-color:#34d399;}
.mbh[data-mt=almuerzo]{border-color:#4ade80;}
.mbh[data-mt=refaccion_t]{border-color:#fbbf24;}
.mbh[data-mt=cena]{border-color:#818cf8;}
.meal-emj{font-size:1.8rem;}
.meal-info{flex:1;}
.meal-label{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.meal-nombre{font-size:.97rem;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.meal-meta{font-size:.72rem;color:var(--muted);margin-top:2px;}
.meal-chevron{color:var(--muted);transition:transform .2s;font-size:.9rem;}
.meal-chevron.open{transform:rotate(90deg);}
.mbb{display:none;padding:0 16px 15px;border-top:1px solid var(--border);}
.mbb.open{display:block;}
.mbb-sec{margin-top:12px;}
.mbb-sec h4{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.mbb-sec p{font-size:.86rem;line-height:1.75;white-space:pre-wrap;color:var(--text);}
.empty-today{background:var(--card);border-radius:20px;border:1px dashed var(--border2);padding:32px;text-align:center;color:var(--muted);margin-bottom:10px;font-size:.87rem;}
.prog-wrap{background:var(--border);border-radius:10px;height:4px;margin:8px 0 18px;}
.prog-bar{background:linear-gradient(90deg,var(--pl),var(--primary));height:100%;border-radius:10px;transition:width .4s;}
.task-item{background:var(--card);border-radius:18px;border:1px solid var(--border);margin-bottom:9px;overflow:hidden;}
.task-hdr{display:flex;align-items:center;gap:11px;padding:14px 15px;cursor:pointer;}
.task-check{width:25px;height:25px;border-radius:50%;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0;transition:all .2s;cursor:pointer;}
.task-check.done{background:var(--primary);border-color:var(--primary);box-shadow:0 0 12px rgba(180,127,255,.35);}
.task-text{flex:1;}
.task-nombre{font-size:.9rem;font-weight:600;color:var(--text);}
.task-nombre.done{text-decoration:line-through;color:var(--muted);}
.task-area-badge{font-size:.67rem;color:var(--muted);}
.task-inst{display:none;padding:0 15px 13px;font-size:.83rem;line-height:1.7;color:var(--muted);border-top:1px solid var(--border);white-space:pre-wrap;}
.task-inst.open{display:block;}
.task-area-hdr{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:14px 0 6px;}
.frec-pill{font-size:.67rem;padding:2px 8px;border-radius:20px;}
.fp-diario{background:rgba(52,211,153,.15);color:#34d399;}
.fp-semanal{background:rgba(96,165,250,.15);color:#60a5fa;}
.fp-quincenal{background:rgba(251,191,36,.15);color:#fbbf24;}
.fp-mensual{background:rgba(180,127,255,.15);color:#b47fff;}
.fp-especial{background:rgba(248,113,113,.15);color:#f87171;}

/* ADMIN */
#sa{background:var(--bg);}
.tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 12px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:13px 14px;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.admin-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view{padding:15px 15px;display:none;}
.view.active{display:block;}
.week-nav{display:flex;align-items:center;gap:8px;padding:10px 15px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.nav-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;}
.nav-btn:hover{border-color:var(--primary);color:var(--primary);}
.wlabel{font-weight:700;font-size:.88rem;flex:1;text-align:center;color:var(--text);}
.wdates{font-size:.68rem;color:var(--muted);text-align:center;}
.save-btn{background:var(--accent);color:white;border:none;padding:7px 13px;border-radius:9px;cursor:pointer;font-weight:700;font-size:.78rem;font-family:inherit;}
.gen-btn{background:linear-gradient(135deg,#7c3aed,#b47fff);color:white;border:none;padding:7px 13px;border-radius:9px;cursor:pointer;font-weight:700;font-size:.78rem;font-family:inherit;}
.sbar{display:flex;gap:12px;padding:8px 15px;background:rgba(180,127,255,.05);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.stat{font-size:.77rem;color:var(--primary);}

/* MEAL GRID */
.scw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.meal-grid{display:grid;}
.gh{background:var(--card);border:1px solid var(--border);padding:9px 5px;text-align:center;font-size:.72rem;font-weight:700;color:var(--muted);}
.gh.today{color:var(--primary);background:rgba(180,127,255,.07);}
.mtlabel{background:var(--bg);border:1px solid var(--border);padding:8px 6px;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;display:flex;flex-direction:column;justify-content:center;gap:2px;border-left:3px solid var(--border);}
.mtlabel[data-mt=desayuno]{border-left-color:#fb923c;}
.mtlabel[data-mt=refaccion_m]{border-left-color:#34d399;}
.mtlabel[data-mt=almuerzo]{border-left-color:#4ade80;}
.mtlabel[data-mt=refaccion_t]{border-left-color:#fbbf24;}
.mtlabel[data-mt=cena]{border-left-color:#818cf8;}
.mtlabel .mt-sub{font-size:.6rem;font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);}
.mc{background:var(--card);border:1px solid var(--border);padding:7px;min-height:64px;display:flex;flex-direction:column;gap:3px;}
.mc.tcol{background:rgba(180,127,255,.04);}
.mc-person{cursor:pointer;transition:background .15s;border-radius:8px;padding:4px 5px;flex:1;}
.mc-person:hover{background:var(--card2);}
.mc-plabel{font-size:.58rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.mc-hora{font-size:.62rem;color:var(--accent);font-weight:600;}
.mc-name{font-size:.73rem;font-weight:600;line-height:1.3;color:var(--text);}
.mc-time{font-size:.62rem;color:var(--muted);}
.mc-empty{color:var(--border2);font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex:1;cursor:pointer;border-radius:8px;transition:all .15s;}
.mc-empty:hover{background:var(--card2);color:var(--primary);}
.mc-divider{height:1px;background:var(--border);margin:3px 0;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--primary);margin-left:auto;}

/* MOBILE ADMIN */
.mob-dnav{display:none;}
.mob-meals{display:none;}

/* MONTH VIEW */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mnav strong{font-size:.9rem;color:var(--text);}
.mnav select{border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-family:inherit;font-size:.82rem;background:var(--card);color:var(--text);}
.mgrid{display:flex;flex-direction:column;gap:10px;}
.wcard{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
.wch{padding:10px 15px;background:rgba(180,127,255,.05);font-size:.8rem;font-weight:700;color:var(--text);}
.wcb{padding:8px 15px 11px;}
.wdr{display:flex;gap:7px;margin-bottom:4px;align-items:flex-start;}
.wdn{font-size:.7rem;font-weight:700;color:var(--muted);width:26px;flex-shrink:0;}
.wdm{display:flex;flex-wrap:wrap;gap:4px;}
.pill{font-size:.66rem;padding:3px 8px;border-radius:20px;}
.pdesayuno{background:rgba(251,146,60,.15);color:#fb923c;}
.palmuerzo{background:rgba(74,222,128,.15);color:#4ade80;}
.pcena{background:rgba(129,140,248,.15);color:#818cf8;}
.prefaccion_m{background:rgba(52,211,153,.15);color:#34d399;}
.prefaccion_t{background:rgba(251,191,36,.15);color:#fbbf24;}

/* RECIPE DB */
.sb{margin-bottom:14px;}
.sb input{width:100%;border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:16px;background:var(--card);font-family:inherit;color:var(--text);}
.sb input:focus{outline:none;border-color:var(--primary);}
.rdb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.rdb-cat{margin-bottom:24px;}
.rdb-cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);margin-bottom:12px;}
.rdb-cat-title{font-weight:700;font-size:.92rem;color:var(--text);}
.rdb-add-btn{background:var(--card2);color:var(--primary);border:1px solid var(--border);padding:6px 12px;border-radius:9px;cursor:pointer;font-size:.77rem;font-weight:600;font-family:inherit;}
.rdb-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px;}
.rdb-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 15px;transition:border-color .2s;}
.rdb-card:hover{border-color:var(--border2);}
.rdb-card-name{font-weight:600;font-size:.88rem;margin-bottom:3px;color:var(--text);}
.rdb-card-meta{font-size:.72rem;color:var(--muted);}
.rdb-card-person{font-size:.67rem;background:rgba(180,127,255,.15);color:#b47fff;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:4px;}
.rdb-card-btns{display:flex;gap:6px;margin-top:10px;}
.rdb-ebtn{border:1px solid var(--border);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:.7rem;font-weight:600;font-family:inherit;background:var(--card2);}
.rdb-ebtn-e{color:var(--primary);}
.rdb-ebtn-d{color:#f87171;}
.rdb-empty{font-size:.8rem;color:var(--muted);padding:8px 0;font-style:italic;}

/* TASKS */
.admin-task-area{margin-bottom:20px;}
.admin-task-area-hdr{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:9px;}
.admin-task-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.admin-task-nombre{flex:1;font-size:.86rem;color:var(--text);}

/* TEMPLATES */
.tmpl-empty{text-align:center;color:var(--muted);padding:34px 16px;font-size:.87rem;}
.tmpl-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px 16px;margin-bottom:11px;}
.tmpl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.tmpl-title{font-weight:700;font-size:.92rem;color:var(--text);}
.tmpl-meta{font-size:.74rem;color:var(--muted);}
.tmpl-btn{background:linear-gradient(135deg,var(--pl),var(--primary));color:white;border:none;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;}

/* CONFIG */
.cfg-section{margin-bottom:24px;}
.cfg-section-title{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;}
.cfg-member{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--border);}
.cfg-member span{flex:1;font-size:.9rem;color:var(--text);}
.cfg-btn-sm{border:1px solid var(--border);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:.7rem;font-weight:600;font-family:inherit;background:var(--card2);}
.cfg-btn-del{color:#f87171;}
.cfg-btn-edit{color:var(--primary);}
.add-input-row{display:flex;gap:8px;margin-top:10px;}
.add-input-row input{flex:1;border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:16px;font-family:inherit;background:var(--card);color:var(--text);}
.add-input-row input:focus{outline:none;border-color:var(--primary);}
.add-input-row button{background:var(--primary);color:white;border:none;padding:9px 15px;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:700;font-family:inherit;}
.mt-row{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--border);}
.mt-row .mt-info{flex:1;}
.mt-row .mt-label{font-size:.9rem;font-weight:600;color:var(--text);}
.mt-row .mt-sub{font-size:.73rem;color:var(--muted);margin-top:2px;}
.tog{position:relative;width:40px;height:22px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.tog .sl{position:absolute;inset:0;background:var(--border2);border-radius:22px;cursor:pointer;transition:.3s;}
.tog input:checked+.sl{background:var(--primary);}
.tog .sl::before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
.tog input:checked+.sl::before{transform:translateX(18px);}
.pp-tag{font-size:.64rem;background:var(--card2);color:var(--muted);padding:3px 9px;border-radius:20px;cursor:pointer;border:1px solid var(--border);font-family:inherit;font-weight:600;flex-shrink:0;}
.pp-tag.on{background:rgba(180,127,255,.15);color:var(--primary);border-color:var(--primary);}
.cfg-save-btn{width:100%;background:linear-gradient(135deg,var(--pl),var(--primary));color:white;border:none;padding:14px;border-radius:13px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;}

/* MODALS */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.mo.open{display:flex;}
.md{background:var(--card);width:100%;max-width:540px;max-height:90dvh;overflow-y:auto;border-radius:26px 26px 0 0;border:1px solid var(--border);border-bottom:none;padding-bottom:max(18px,env(safe-area-inset-bottom));}
.mh{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 20px 13px;border-bottom:1px solid var(--border);}
.mtitle{font-size:1rem;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.msub{font-size:.73rem;color:var(--muted);margin-top:2px;}
.mcl{background:var(--card2);border:1px solid var(--border);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);}
.mb{padding:15px 20px;display:flex;flex-direction:column;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:.74rem;font-weight:600;color:var(--muted);letter-spacing:.01em;}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);border-radius:11px;padding:10px 13px;font-size:16px;font-family:inherit;background:var(--card2);color:var(--text);width:100%;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--primary);}
.fg textarea{resize:vertical;min-height:90px;}
.trow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.trow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mf{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px 16px;border-top:1px solid var(--border);flex-wrap:wrap;}
.btn{padding:9px 18px;border-radius:11px;border:none;cursor:pointer;font-size:.86rem;font-weight:700;font-family:inherit;}
.btn-p{background:linear-gradient(135deg,var(--pl),var(--primary));color:white;}
.btn-g{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.btn-d{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2);}
.btn-ausente{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:9px 14px;cursor:pointer;font-size:.84rem;font-weight:600;}
.mc-ausente{background:rgba(255,255,255,.03);border-radius:10px;padding:7px;text-align:center;font-size:.75rem;color:var(--muted);cursor:pointer;border:1px dashed var(--border2);}
.rpick-btn{background:var(--card2);color:var(--text);border:1px solid var(--border);padding:9px 14px;border-radius:11px;cursor:pointer;font-size:.84rem;font-weight:600;width:100%;font-family:inherit;text-align:left;transition:border-color .2s;}
.rpick-btn:hover{border-color:var(--primary);}
.rpick-list{max-height:190px;overflow-y:auto;border:1px solid var(--border);border-radius:11px;display:none;background:var(--card2);margin-top:5px;}
.rpick-list.open{display:block;}
.rpick-item{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--border);}
.rpick-item:last-child{border-bottom:none;}
.rpick-item:hover{background:rgba(180,127,255,.06);}
.rpick-name{font-weight:600;font-size:.86rem;color:var(--text);}
.rpick-meta{font-size:.7rem;color:var(--muted);margin-top:2px;}
#rmodal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
#rmodal.open{display:flex;}
.rmd{background:var(--card);width:100%;max-width:540px;max-height:88dvh;overflow-y:auto;border-radius:26px 26px 0 0;border:1px solid var(--border);border-bottom:none;padding:20px 20px max(24px,env(safe-area-inset-bottom));}
.rmd-close{display:block;margin:0 0 15px auto;background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:9px;cursor:pointer;font-size:.8rem;font-family:inherit;}
.rmd-title{font-size:1.1rem;font-weight:800;margin-bottom:4px;color:var(--text);letter-spacing:-.02em;}
.rmd-meta{font-size:.79rem;color:var(--muted);margin-bottom:14px;}
.rmd-sec{margin-top:14px;}
.rmd-sec h4{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.rmd-sec p{font-size:.87rem;line-height:1.75;white-space:pre-wrap;color:var(--text);}
.emoji-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.ep{font-size:1.4rem;cursor:pointer;padding:6px;border-radius:10px;border:2px solid transparent;}
.ep.sel{border-color:var(--primary);background:rgba(180,127,255,.12);}
.toast{position:fixed;bottom:max(26px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:11px 22px;border-radius:14px;font-size:.85rem;font-weight:500;z-index:300;display:none;white-space:nowrap;box-shadow:var(--sh);}
.empty{text-align:center;color:var(--muted);padding:32px 16px;font-size:.87rem;}

/* SUPER */
.super-week-nav{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.super-week-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:10px;cursor:pointer;font-size:.9rem;transition:all .2s;}
.super-week-nav button:hover{border-color:var(--primary);}
.super-week-nav span{font-weight:700;font-size:.88rem;flex:1;text-align:center;}
.super-section{margin-bottom:24px;}
.super-add-row{display:flex;gap:8px;margin-bottom:13px;}
.super-add-row input{flex:1;border:1px solid var(--border);border-radius:11px;padding:10px 14px;font-size:16px;font-family:inherit;background:var(--card);color:var(--text);}
.super-add-row input:focus{outline:none;border-color:var(--primary);}
.super-add-btn{background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:11px;cursor:pointer;font-weight:700;font-size:1rem;font-family:inherit;}
.super-menu-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
.super-menu-cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .2s;}
.super-menu-cb.checked{background:var(--primary);border-color:var(--primary);}
.super-menu-text{font-size:.88rem;color:var(--text);flex:1;}
.super-menu-text.checked{text-decoration:line-through;color:var(--muted);}
.super-item{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--card);border-radius:14px;margin-bottom:8px;border:1px solid var(--border);}
.super-cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .2s;color:white;}
.super-cb.checked{background:var(--primary);border-color:var(--primary);}
.super-req-text{font-size:.88rem;color:var(--text);flex:1;}
.super-req-text.checked{text-decoration:line-through;color:var(--muted);}
.super-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:2px;}
.super-del:hover{color:#f87171;}
.super-clear-btn{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.18);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:.78rem;font-weight:600;font-family:inherit;margin-top:9px;}

@media(min-width:641px){
  .mo{align-items:center;padding:20px;}
  .md{border-radius:22px;}
  #rmodal{align-items:center;padding:20px;}
  .rmd{border-radius:22px;}
  .scw{overflow-x:visible;}
  .meal-grid{min-width:unset;}
}
.mob-bottom-nav{display:none;}
.mob-more-sheet{display:none;}
@media(max-width:640px){
  .tabs{display:none !important;}
  .mob-bottom-nav{
    display:flex;
    position:fixed;
    bottom:0;left:0;right:0;
    background:var(--card);
    border-top:1px solid var(--border);
    padding:6px 0 max(10px,env(safe-area-inset-bottom));
    z-index:50;
  }
  .mbn-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    gap:3px;padding:8px 2px 4px;
    background:none;border:none;color:var(--muted);
    font-size:.6rem;font-weight:600;font-family:inherit;cursor:pointer;
    transition:color .2s;
  }
  .mbn-btn span:first-child{font-size:1.5rem;line-height:1;}
  .mbn-btn.active{color:var(--primary);}
  .mob-more-sheet{
    position:fixed;
    bottom:calc(62px + env(safe-area-inset-bottom));
    left:8px;right:8px;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:18px;
    padding:10px;
    z-index:49;
    flex-direction:column;
    gap:2px;
    box-shadow:0 -4px 24px rgba(0,0,0,.5);
  }
  .mob-more-sheet.open{display:flex;}
  .mob-more-sheet button{
    background:none;border:none;color:var(--text);
    font-size:.92rem;font-weight:600;font-family:inherit;
    padding:13px 16px;text-align:left;cursor:pointer;
    border-radius:12px;transition:background .15s;
  }
  .mob-more-sheet button:hover,.mob-more-sheet button:active{background:var(--card);}
  .admin-body{padding-bottom:calc(70px + env(safe-area-inset-bottom));}
  .scw{display:none;}
  .mob-dnav{display:flex;gap:6px;padding:10px 13px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
  .mob-dnav::-webkit-scrollbar{display:none;}
  .mob-meals{display:block;padding:11px 13px;}
  .mob-day-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .2s;}
  .mob-day-btn.active{background:var(--primary);border-color:var(--primary);color:white;}
  .mob-mt-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:10px;overflow:hidden;}
  .mob-mt-hdr{padding:12px 15px;border-left:3px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
  .mob-mt-hdr[data-mt=desayuno]{border-color:#fb923c;}
  .mob-mt-hdr[data-mt=refaccion_m]{border-color:#34d399;}
  .mob-mt-hdr[data-mt=almuerzo]{border-color:#4ade80;}
  .mob-mt-hdr[data-mt=refaccion_t]{border-color:#fbbf24;}
  .mob-mt-hdr[data-mt=cena]{border-color:#818cf8;}
  .mob-mt-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
  .mob-mt-name{font-size:.92rem;font-weight:700;margin-top:2px;color:var(--text);}
  .mob-mt-empty{color:var(--muted);font-size:.82rem;}
  .mob-person-row{display:flex;align-items:center;justify-content:space-between;padding:9px 15px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;}
  .mob-person-row:hover{background:rgba(255,255,255,.03);}
  .mob-person-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);min-width:52px;}
  .mob-person-meal{font-size:.88rem;font-weight:600;flex:1;padding:0 10px;color:var(--text);}
  .mob-edit-icon{color:var(--muted);font-size:.8rem;}
  .trow{grid-template-columns:1fr 1fr;}
  .trow .fg:last-child{grid-column:span 2;}
  .fam-grid{grid-template-columns:repeat(2,1fr);}
  .week-nav{gap:6px;}
  .wlabel{font-size:.82rem;}
}
</style>
</head>
<body>

<div id="sw" class="screen">

    <div class="sw-logo">🏠</div>

  </div>
  <div class="sw-body">
    <div class="fam-grid" id="fam-grid"></div>
  </div>
</div>

<div id="sp" class="screen">
  <button class="pin-back" onclick="renderWelcome()">&#8592; Familias</button>

    <span class="pin-fam-name" id="pin-fam-name">Familia</span>
  </div>

    </div>

      <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>

<div id="sc" class="screen">

    <div style="display:flex;gap:6px">

    </div>
  </div>
  <div class="cook-body" id="cook-body"></div>
</div>

    <div><h1 id="sa-fam-name">&#127968;</h1><p id="sa-role-lbl"></p></div>

      <button class="hbtn" onclick="show('sc');renderCocinera()">&#128101; Elena</button>
      <button class="hbtn" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="tabs" id="admin-tabs">
    <div class="tab active" onclick="switchTab('semana')">&#128197; Semana</div>
    <div class="tab" onclick="switchTab('mes')">&#128198; Mes</div>
    <div class="tab" onclick="switchTab('recetas')">&#128218; Recetas</div>
    <div class="tab" onclick="switchTab('tareas')">&#9989; Tareas</div>
    <div class="tab" onclick="switchTab('plantillas')">&#128203; Plantillas</div>
    <div class="tab" onclick="switchTab('config')">&#9881; Config</div>
    <div class="tab" onclick="switchTab('super')">&#128722; Super</div>

    </div>

    </div>
    <div class="mf">
      <button class="btn btn-g" onclick="closeFamModal()">Cancelar</button>
      <button class="btn btn-p" onclick="saveNewFamily()">Crear familia</button>
    </div>
  </div>
</div>

<!-- COCINERA RECIPE DETAIL MODAL -->
<div id="rmodal" onclick="if(event.target.id==='rmodal')closeRModal()">
  <div class="rmd">
    <button class="rmd-close" onclick="closeRModal()">Cerrar</button>
    <div class="rmd-title" id="rmd-title"></div>
    <div class="rmd-meta" id="rmd-meta"></div>
    <div id="rmd-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ── STATE ──────────────────────────────────────────────────────
var S={families:[],fam:null,role:null,menu:{},recipes:[],tasks:[],taskDone:{},defaults:{menus:{},recipes:[]},wOff:0,editing:null,dbEdit:{mt:null,idx:null},mDay:'Lunes',pinBuf:''};

// ── DB (localStorage wrapper – swap for Firebase later) ────────
var DB=(function(){
  function g(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
  function s(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){toast('Error guardando datos');}}
  return{
    families:function(){return g('hv_fams',[]);},
    saveFamilies:function(f){s('hv_fams',f);},
    menu:function(id){return g('hv_menu_'+id,{});},
    saveMenu:function(id,d){s('hv_menu_'+id,d);},
    recipes:function(id){return g('hv_rec_'+id,null);},
    saveRecipes:function(id,d){s('hv_rec_'+id,d);},
    tasks:function(id){return g('hv_tasks_'+id,[]);},
    saveTasks:function(id,d){s('hv_tasks_'+id,d);},
    taskDone:function(id){return g('hv_tdone_'+id,{});},
    saveTaskDone:function(id,d){s('hv_tdone_'+id,d);},
    defaults:function(){return g('hv_defaults',{menus:{},recipes:[]});},
    saveDefaults:function(d){s('hv_defaults',d);},
    super:function(id){return g('hv_super_'+id,{items:[],menuChecked:{}});},
    saveSuper:function(id,d){s('hv_super_'+id,d);}
  };
})();

// ── CONSTANTS ──────────────────────────────────────────────────
var DAYS=['Lunes','Martes','Miercoles','Jueves','Viernes'];
var DSHORT=['Lun','Mar','Mié','Jue','Vie'];
var DAYS_ES=['Lunes','Martes','Miércoles','Jueves','Viernes'];
var DEFAULT_MTS=[
  {id:'desayuno',label:'Desayuno',emoji:'🍳',hour:'07:00',active:true,perPerson:false},
  {id:'refaccion_m',label:'Refacción Mañana',emoji:'🍎',hour:'10:00',active:false,perPerson:false},
  {id:'almuerzo',label:'Almuerzo',emoji:'🥗',hour:'13:00',active:true,perPerson:false},
  {id:'refaccion_t',label:'Refacción Tarde',emoji:'🍌',hour:'16:00',active:false,perPerson:false},
  {id:'cena',label:'Cena',emoji:'🌙',hour:'19:00',active:true,perPerson:false}
];
var MT_COLORS={desayuno:'#fb923c',refaccion_m:'#10b981',almuerzo:'#52b788',refaccion_t:'#f59e0b',cena:'#818cf8'};

// ── HELPERS ────────────────────────────────────────────────────
function dc(o){return JSON.parse(JSON.stringify(o));}
function fmt(d){return d.getDate()+'/'+(d.getMonth()+1);}
function isToday(d){var t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();}
function gwk(off){var d=new Date();d.setDate(d.getDate()+off*7-(d.getDay()||7)+1);var jan4=new Date(d.getFullYear(),0,4),dow=jan4.getDay()||7;var wk=Math.ceil((((d-new Date(d.getFullYear(),0,1))/864e5)+dow)/7);return d.getFullYear()+'-W'+String(wk).padStart(2,'0');}
function gwd(off){var d=new Date();d.setDate(d.getDate()-(d.getDay()||7)+1+off*7);return[0,1,2,3,4].map(function(i){var dd=new Date(d);dd.setDate(d.getDate()+i);return dd;});}
function gwkd(wk){try{var p=wk.split('-W'),y=parseInt(p[0]),w=parseInt(p[1]),jan4=new Date(y,0,4),dow=jan4.getDay()||7,d=new Date(jan4);d.setDate(jan4.getDate()-dow+1+(w-1)*7);return[0,1,2,3,4].map(function(i){var dd=new Date(d);dd.setDate(d.getDate()+i);return dd;});}catch(e){return null;}}
function getTodayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getTodayDayName(){return['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'][new Date().getDay()];}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2800);}
function formatHora(h){if(!h)return'';var p=h.split(':'),hr=parseInt(p[0]),mn=p[1]||'00';var ap=hr>=12?'PM':'AM';hr=hr%12||12;return hr+(mn!=='00'?':'+mn:'')+' '+ap;}
function activeMTs(){return(S.fam.mealTimes||DEFAULT_MTS).filter(function(mt){return mt.active;});}
function getPersons(mt){return mt.perPerson?(S.fam.members||['Todos']):['shared'];}
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function famSlug(name){return name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'_'+Date.now().toString(36);}

// ── WELCOME ────────────────────────────────────────────────────
function renderWelcome(){
  S.families=DB.families();
  var d=new Date();
  var el=document.getElementById('swdate');
  if(el)el.textContent=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var grid=document.getElementById('fam-grid');
  var html=S.families.map(function(f){
    var mts=(f.mealTimes||DEFAULT_MTS).filter(function(m){return m.active;}).length;
    var mem=f.members?f.members.length:0;
    return "<div class='fam-card' onclick='selectFamily(\""+f.id+"\")'><div class='fam-emoji'>"+f.emoji+"</div><div class='fam-name'>"+f.name+"</div><div class='fam-sub'>"+mem+" miembro"+(mem!==1?'s':'')+' · '+mts+" tiempo"+(mts!==1?'s':'')+"</div></div>";
  }).join('');
  html+="<button class='add-fam-btn' onclick='openNewFamModal()'>&#10133; Agregar familia</button>";
  grid.innerHTML=html;
  show('sw');
}

// ── FAMILY SELECTION & PIN ──────────────────────────────────────
function selectFamily(id){
  var fam=S.families.find(function(f){return f.id===id;});
  if(!fam)return;
  S.fam=fam;S.pinBuf='';updatePinDots('');
  document.getElementById('pin-fam-emoji').textContent=fam.emoji;
  document.getElementById('pin-fam-name').textContent=fam.name;
  document.getElementById('pin-err').textContent='';
  show('sp');
}
function pinKey(k){
  if(S.pinBuf.length>=4)return;
  S.pinBuf+=k;updatePinDots(S.pinBuf);
  if(S.pinBuf.length===4)setTimeout(checkPin,200);
}
function pinDel(){S.pinBuf=S.pinBuf.slice(0,-1);updatePinDots(S.pinBuf);}
function updatePinDots(buf){document.querySelectorAll('.pin-dot').forEach(function(d,i){d.classList.toggle('filled',i<buf.length);d.classList.remove('error');});}
function checkPin(){
  var fam=S.fam,buf=S.pinBuf;
  if(buf===fam.adminPin){S.role='admin';loadFamilyData();enterAdmin();}
  else if(buf===fam.cookPin){S.role='cook';loadFamilyData();enterCook();}
  else{
    document.querySelectorAll('.pin-dot').forEach(function(d){d.classList.add('error');});
    document.getElementById('pin-err').textContent='PIN incorrecto';
    setTimeout(function(){S.pinBuf='';updatePinDots('');document.getElementById('pin-err').textContent='';},1000);
  }
}
function loadFamilyData(){
  var id=S.fam.id;
  S.menu=DB.menu(id);
  var sr=DB.recipes(id);
  if(sr===null){S.recipes=getSeedRecipes();}
  else{
    // Merge: add any seed recipes whose id is not already saved
    var seed=getSeedRecipes();
    var existingIds=sr.map(function(r){return r.id;});
    var toAdd=seed.filter(function(r){return existingIds.indexOf(r.id)===-1;});
    S.recipes=toAdd.length>0?sr.concat(toAdd):sr;
    if(toAdd.length>0)DB.saveRecipes(id,S.recipes);
  }
  S.tasks=DB.tasks(id);
  S.taskDone=DB.taskDone(id);
  S.defaults=DB.defaults();
  S.wOff=0;S.mDay='Lunes';
}
function enterCook(){
  document.getElementById('sc-fam-name').textContent=S.fam.emoji+' '+S.fam.name;
  var dayName=getTodayDayName();
  var dnames={'Lunes':'Lunes','Martes':'Martes','Miercoles':'Miércoles','Jueves':'Jueves','Viernes':'Viernes','Sabado':'Sábado','Domingo':'Domingo'};
  document.getElementById('sc-day-label').textContent=dnames[dayName]||dayName;
  renderCocinera();show('sc');
}
function enterAdmin(){
  document.getElementById('sa-fam-name').textContent=S.fam.emoji+' '+S.fam.name;
  document.getElementById('sa-role-lbl').textContent='Administrador';
  renderWeek();switchTab('semana');show('sa');
}
function logout(){S.fam=null;S.role=null;renderWelcome();}

// ── COCINERA ────────────────────────────────────────────────────
function renderCocinera(){
  var dayName=getTodayDayName();
  var wk=gwk(0),dayData=(S.menu[wk]&&S.menu[wk][dayName])||{};
  var mts=activeMTs();
  var taskKey=getTodayKey();
  var done=S.taskDone[taskKey]||{};
  var todayTasks=S.tasks.filter(function(t){return isTaskToday(t);});
  var html='';
  var d=new Date();
  var dMap={'Lunes':'Lun','Martes':'Mar','Miercoles':'Mié','Jueves':'Jue','Viernes':'Vie','Sabado':'Sáb','Domingo':'Dom'};
  html+="<div class='today-hdr'><div class='today-title'>"+dMap[dayName]+" "+d.getDate()+"/"+(d.getMonth()+1)+"</div><div class='today-date'>"+d.getFullYear()+"</div></div>";
  
  html+="<div class='section-lbl'>🍽️ Comidas de hoy</div>";
  var hasMeals=false;
  mts.forEach(function(mt){
    var persons=getPersons(mt);
    persons.forEach(function(p){
      var meal=dayData[mt.id]&&dayData[mt.id][p];
      var label=mt.perPerson&&p!=='shared'?(mt.emoji+' '+mt.label+' – '+p):(mt.emoji+' '+mt.label);
      var key=mt.id+'_'+p;
      if(meal&&meal.nombre&&!meal.ausente){
        hasMeals=true;
        var meta=[meal.tiempo&&'⏱ '+meal.tiempo,meal.porciones&&'👥 '+meal.porciones,meal.hora&&formatHora(meal.hora)].filter(Boolean).join(' · ');
        html+="<div class='meal-big'><div class='mbh' data-mt='"+mt.id+"' onclick='toggleMealCard(\""+key+"\")'>";
        html+="<span class='meal-emj'>"+mt.emoji+"</span><div class='meal-info'><div class='meal-label'>"+label+"</div><div class='meal-nombre'>"+meal.nombre+"</div>"+(meta?"<div class='meal-meta'>"+meta+"</div>":"")+"</div>";
        html+="<span class='meal-chevron' id='chv-"+key+"'>&#9654;</span></div>";
        if(meal.ingredientes||meal.receta){
          html+="<div class='mbb' id='mbb-"+key+"'>";
          if(meal.ingredientes)html+="<div class='mbb-sec'><h4>Ingredientes</h4><p>"+meal.ingredientes+"</p></div>";
          if(meal.receta)html+="<div class='mbb-sec'><h4>Preparación</h4><p>"+meal.receta+"</p></div>";
          html+="</div>";
        }
        html+="</div>";
      }
    });
  });
  if(!hasMeals)html+="<div class='empty-today'>Sin comidas programadas para hoy</div>";
  
  if(todayTasks.length){
    var doneCount=todayTasks.filter(function(t){return done[t.id];}).length;
    var pct=Math.round(doneCount/todayTasks.length*100);
    html+="<div class='section-lbl'>✅ Tareas de hoy ("+doneCount+"/"+todayTasks.length+")</div>";
    html+="<div class='prog-wrap'><div class='prog-bar' style='width:"+pct+"%'></div></div>";
    var areas=[...new Set(todayTasks.map(function(t){return t.area;}))];
    areas.forEach(function(area){
      html+="<div class='task-area-hdr'>"+area+"</div>";
      todayTasks.filter(function(t){return t.area===area;}).forEach(function(t){
        var isDone=!!done[t.id];
        html+="<div class='task-item'><div class='task-hdr'>";
        html+="<div class='task-check"+(isDone?' done':'')+"' onclick='toggleTask("+t.id+")'>"+( isDone?'✓':'')+"</div>";
        html+="<div class='task-text'><div class='task-nombre"+(isDone?' done':'')+"'>"+t.nombre+"</div><div class='task-area-badge'>"+t.area+"</div></div>";
        if(t.inst)html+="<span style='color:var(--muted);font-size:.8rem;cursor:pointer' onclick='toggleTaskInst("+t.id+")'>&#9432;</span>";
        html+="</div>";
        if(t.inst)html+="<div class='task-inst' id='tinst-"+t.id+"'>"+t.inst+"</div>";
        html+="</div>";
      });
    });
  }
  document.getElementById('cook-body').innerHTML=html;
}
function toggleMealCard(key){
  var c=document.getElementById('chv-'+key);var b=document.getElementById('mbb-'+key);
  if(b){b.classList.toggle('open');if(c)c.classList.toggle('open');}
}
function isTaskToday(t){
  if(!t.fp)return false;
  var day=new Date().getDay();
  if(t.fp==='diario')return day>=1&&day<=6;
  if(t.fp==='especial')return false;
  if(Array.isArray(t.dias))return t.dias.indexOf(day)!==-1;
  if(t.fp==='quincenal'){var dom=new Date().getDate();return dom===1||dom===16;}
  if(t.fp==='mensual')return new Date().getDate()===1;
  return false;
}
function toggleTask(id){
  var key=getTodayKey();
  if(!S.taskDone[key])S.taskDone[key]={};
  S.taskDone[key][id]=!S.taskDone[key][id];
  if(!S.taskDone[key][id])delete S.taskDone[key][id];
  DB.saveTaskDone(S.fam.id,S.taskDone);renderCocinera();
}
function toggleTaskInst(id){var el=document.getElementById('tinst-'+id);if(el)el.classList.toggle('open');}

// ── ADMIN – WEEK VIEW ──────────────────────────────────────────
function renderWeek(){
  var mts=activeMTs(),dates=gwd(S.wOff),wk=gwk(S.wOff),data=S.menu[wk]||{};
  var off=S.wOff;
  var lbl=off===0?'Esta semana':off===-1?'Semana pasada':off===1?'Próxima semana':off<0?'Hace '+Math.abs(off)+' semanas':'En '+off+' semanas';
  document.getElementById('wlabel').textContent=lbl+' ('+wk+')';
  document.getElementById('wdates').textContent=fmt(dates[0])+' – '+fmt(dates[4]);
  // count meals
  var total=0,filled=0;
  mts.forEach(function(mt){var ps=getPersons(mt);DAYS.forEach(function(d){ps.forEach(function(p){total++;if(data[d]&&data[d][mt.id]&&data[d][mt.id][p]&&data[d][mt.id][p].nombre)filled++;});});});
  document.getElementById('sbar').innerHTML="<span class='stat'>✅ <strong>"+filled+"/"+total+"</strong> comidas</span>"+(filled===total&&total>0?"<span class='stat' style='color:#166534'>🎉 Completa!</span>":"<span class='stat' style='color:#92400e'>⚡ Faltan "+(total-filled)+"</span>");
  
  // Desktop grid
  var ncols=1+DAYS.length;
  var html="<div class='meal-grid' style='grid-template-columns:80px repeat("+DAYS.length+",1fr)'>";
  html+="<div class='gh'></div>";
  dates.forEach(function(d,i){var td=isToday(d);html+="<div class='gh"+(td?' today':'')+"'>"+(td?'⭐ ':'')+DSHORT[i]+"<br><span style='font-weight:400;font-size:.62rem'>"+fmt(d)+"</span></div>";});
  mts.forEach(function(mt){
    var ps=getPersons(mt);
    html+="<div class='mtlabel' data-mt='"+mt.id+"'><span>"+mt.emoji+" "+mt.label+"</span>"+(mt.perPerson?"<span class='mt-sub'>"+ps.join(', ')+"</span>":"")+"</div>";
    DAYS.forEach(function(day,di){
      var td=isToday(dates[di]);
      html+="<div class='mc"+(td?' tcol':'')+"'>";
      ps.forEach(function(p,pi){
        if(pi>0)html+="<div class='mc-divider'></div>";
        var e=data[day]&&data[day][mt.id]&&data[day][mt.id][p]?data[day][mt.id][p]:null;
        var esc_wk=wk.replace(/"/g,'&quot;'),esc_d=day.replace(/"/g,'&quot;'),esc_mt=mt.id,esc_p=p;
        if(e&&e.nombre){
          html+="<div class='mc-person' onclick='openModal(\""+esc_wk+"\",\""+esc_d+"\",\""+esc_mt+"\",\""+esc_p+"\")'>";
          if(mt.perPerson)html+="<div class='mc-plabel'>"+p+"</div>";
          if(e.hora)html+="<div class='mc-hora'>"+formatHora(e.hora)+"</div>";
          html+="<div class='mc-name'>"+e.nombre+"</div>";
          if(e.tiempo)html+="<div class='mc-time'>⏱ "+e.tiempo+"</div>";
          html+="</div>";
        } else {
          if(e&&e.ausente){html+="<div class='mc-ausente' onclick='openModal(\"" + esc_wk + "\",\"" + esc_d + "\",\"" + esc_mt + "\",\"" + esc_p + "\")'>&#x1F6AB;<br>"+(mt.perPerson?p:"No come")+"</div>";}
          else{html+="<div class='mc-empty' onclick='openModal(\""+esc_wk+"\",\""+esc_d+"\",\""+esc_mt+"\",\""+esc_p+"\")'>"+(mt.perPerson?"<div style='font-size:.6rem;text-align:center'><div style='font-size:.9rem'>+</div>"+p+"</div>":"<div>+</div>")+"</div>";}
        }
      });
      html+="</div>";
    });
  });
  html+="</div>";
  document.getElementById('mgrid').innerHTML=html;
  renderMobile();
}

function renderMobile(){
  var wk=gwk(S.wOff),data=S.menu[wk]||{},mts=activeMTs(),dates=gwd(S.wOff);
  var nav=document.getElementById('mdnav');
  if(!nav)return;
  nav.innerHTML=DAYS.map(function(day,i){var td=isToday(dates[i]);return"<button class='mob-day-btn"+(day===S.mDay?' active':'')+(td?' today':'')+"' data-day='"+day+"' onclick='selMobDay(this.dataset.day)'>"+(td?'⭐ ':'')+DSHORT[i]+"</button>";}).join('');
  var dayData=data[S.mDay]||{};
  var html="";
  mts.forEach(function(mt){
    var ps=getPersons(mt);
    html+="<div class='mob-mt-card'><div class='mob-mt-hdr' data-mt='"+mt.id+"'><div><div class='mob-mt-label'>"+mt.emoji+" "+mt.label+"</div></div></div>";
    ps.forEach(function(p){
      var e=dayData[mt.id]&&dayData[mt.id][p];
      var esc_wk=wk.replace(/"/g,'&quot;'),esc_d=S.mDay.replace(/"/g,'&quot;');
      html+="<div class='mob-person-row' onclick='openModal(\""+esc_wk+"\",\""+esc_d+"\",\""+mt.id+"\",\""+p+"\")'>";
      if(mt.perPerson)html+="<span class='mob-person-lbl'>"+p+"</span>";
      if(e&&e.nombre){html+="<span class='mob-person-meal'>"+e.nombre+"</span><span class='mob-edit-icon'>✏️</span>";}
      else{html+="<span class='mob-person-meal' style='color:var(--muted);font-style:italic'>Sin asignar</span><span class='mob-edit-icon' style='color:var(--border)'>+</span>";}
      html+="</div>";
    });
    html+="</div>";
  });
  document.getElementById('mmeals').innerHTML=html;
}
function selMobDay(day){S.mDay=day;renderMobile();}
function changeWeek(d){S.wOff+=d;renderWeek();}

// ── MEAL MODAL ─────────────────────────────────────────────────
function openModal(wk,day,mtId,person){
  S.editing={wk:wk,day:day,mt:mtId,person:person};
  var e=(S.menu[wk]&&S.menu[wk][day]&&S.menu[wk][day][mtId]&&S.menu[wk][day][mtId][person])||{};
  var isAusente=e.ausente===true;
  var mt=(S.fam.mealTimes||DEFAULT_MTS).find(function(m){return m.id===mtId;})||{label:mtId,emoji:'🍽️'};
  var di=DAYS.indexOf(day);
  var pLabel=mt.perPerson&&person!=='shared'?' – '+person:'';
  document.getElementById('mtitle').textContent=mt.emoji+' '+mt.label+pLabel+' – '+(di>=0?DAYS_ES[di]:day);
  document.getElementById('msub').textContent=wk;
  document.getElementById('fn').value=e.nombre||'';
  document.getElementById('fh').value=e.hora||'';
  document.getElementById('ft').value=e.tiempo||'';
  document.getElementById('fp2').value=e.porciones||'';
  document.getElementById('fi').value=e.ingredientes||'';
  document.getElementById('fr').value=e.receta||'';
  document.getElementById('bdel').style.display=(e.nombre||isAusente)?'block':'none';
  var baus=document.getElementById('baus');if(baus)baus.style.display=isAusente?'none':'block';
  var bback=document.getElementById('modal-back-btn');if(bback)bback.style.display=(!mt.perPerson&&person!=='shared')?'block':'none';
  var fields=['fn','fh','ft','fp2','fi','fr'];fields.forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=!!isAusente;});
  // Recipe picker
  var pool=S.recipes.filter(function(r){return r.mt===mtId&&(r.person===person||r.person===''||r.person==='shared'||(mt.perPerson&&r.person===person));});
  if(!pool.length)pool=S.recipes.filter(function(r){return r.mt===mtId;});
  var pl=document.getElementById('rpick-list');
  pl.classList.remove('open');
  if(pool.length){
    pl.innerHTML=pool.map(function(r,i){var idx=S.recipes.indexOf(r);var meta=[r.tiempo,r.porciones].filter(Boolean).join(' · ');return"<div class='rpick-item' onclick='pickFromDB("+idx+")'><div class='rpick-name'>"+r.nombre+"</div>"+(meta?"<div class='rpick-meta'>"+meta+"</div>":"")+(r.person&&r.person!=='shared'?"<div class='rpick-meta'>Para: "+r.person+"</div>":"")+"</div>";}).join('');
    document.getElementById('rpick-btn').style.display='block';
  } else {
    document.getElementById('rpick-btn').style.display='none';
  }
  document.getElementById('modal').classList.add('open');
  setTimeout(function(){document.getElementById('fn').focus();},80);
}
function closeModal(){document.getElementById('modal').classList.remove('open');S.editing=null;}
function togglePicker(){document.getElementById('rpick-list').classList.toggle('open');}
function pickFromDB(idx){
  var r=S.recipes[idx];if(!r)return;
  document.getElementById('fn').value=r.nombre||'';

// ── RANDOM WEEK GENERATOR ──────────────────────────────────────
function generateRandomWeek(){
  var wk=gwk(S.wOff),mts=activeMTs();
  var hasAny=mts.some(function(mt){return S.recipes.filter(function(r){return r.mt===mt.id;}).length>0;});
  if(!hasAny){toast('Agrega recetas a la base de datos primero');return;}
  if(!confirm('¿Generar menú aleatorio para '+wk+'?\nSe sobreescribirá el menú actual.'))return;
  if(!S.menu[wk])S.menu[wk]={};
  mts.forEach(function(mt){
    var ps=getPersons(mt);
    DAYS.forEach(function(day){
      if(!S.menu[wk][day])S.menu[wk][day]={};
      if(!S.menu[wk][day][mt.id])S.menu[wk][day][mt.id]={};
      ps.forEach(function(p){
        var pool=S.recipes.filter(function(r){return r.mt===mt.id&&(r.person==='shared'||r.person===''||r.person===p);});
        if(!pool.length)pool=S.recipes.filter(function(r){return r.mt===mt.id;});
        if(!pool.length)return;
        // no repeat in same week
        var usedInWeek=[];
        DAYS.forEach(function(d){if(S.menu[wk][d]&&S.menu[wk][d][mt.id]&&S.menu[wk][d][mt.id][p]&&S.menu[wk][d][mt.id][p].nombre)usedInWeek.push(S.menu[wk][d][mt.id][p].nombre);});
        var avail=pool.filter(function(r){return usedInWeek.indexOf(r.nombre)<0;});
        if(!avail.length)avail=pool.slice();
        var pick=avail[Math.floor(Math.random()*avail.length)];
        S.menu[wk][day][mt.id][p]={nombre:pick.nombre,hora:pick.hora||'',tiempo:pick.tiempo||'',porciones:pick.porciones||'',ingredientes:pick.ingredientes||'',receta:pick.receta||''};
      });
    });
  });
  DB.saveMenu(S.fam.id,S.menu);renderWeek();toast('🎲 Semana generada!');
}

// ── TAB MANAGEMENT ─────────────────────────────────────────────
var TABS=['semana','mes','recetas','tareas','plantillas','config','super'];
function mobTab(tab){
  switchTab(tab);
  document.querySelectorAll('.mbn-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  var ms=document.getElementById('mob-more-sheet');
  if(ms)ms.classList.remove('open');
}
function toggleMobMore(){
  var ms=document.getElementById('mob-more-sheet');
  if(ms)ms.classList.toggle('open');
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',TABS[i]===tab);});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById('view-'+tab).classList.add('active');
  var wn=document.getElementById('week-nav');
  var sb=document.getElementById('sbar');
  wn.style.display=tab==='semana'?'flex':'none';
  sb.style.display=tab==='semana'?'flex':'none';
  if(tab==='mes')renderMonth();
  if(tab==='recetas')renderRecipes();
  if(tab==='tareas')renderAdminTareas();
  if(tab==='super')renderSuperTab();
  if(tab==='plantillas')renderTemplates();
  if(tab==='config')renderConfig();
}
function closeRModal(){document.getElementById('rmodal').classList.remove('open');}

// ── SUPER ──────────────────────────────────────────────────────
function renderSuperTab(){
  var wk=gwk(S.wOff),menuData=S.menu[wk]||{},mts=activeMTs();
  var superData=DB.super(S.fam.id);
  var items=superData.items||[];
  var html="";
  html+="<div class='super-week-nav'><button onclick='changeWeek(-1);renderSuperTab()'>&#8592;</button><span>Semana "+wk+"</span><button onclick='changeWeek(1);renderSuperTab()'>&#8594;</button></div>";
  html+="<div class='section-lbl'>🥦 Del menú (ingredientes)</div>";
  var groups=[];
  DAYS.forEach(function(day){
    if(!menuData[day])return;
    mts.forEach(function(mt){
      var allP=['shared'].concat(S.fam.members||[]);
      allP.forEach(function(p){
        var meal=menuData[day][mt.id]&&menuData[day][mt.id][p];
        if(meal&&!meal.ausente&&meal.ingredientes&&meal.ingredientes.trim()){
          groups.push({key:day+'_'+mt.id+'_'+p,label:DAYS_ES[DAYS.indexOf(day)]+' – '+mt.emoji+' '+mt.label+(p!=='shared'?' ('+p+')':''),meal:meal.nombre,ings:meal.ingredientes});
        }
      });
    });
  });
  if(groups.length){
    groups.forEach(function(g,gi){
      html+="<div class='super-meal-group'><div class='super-meal-name'>"+g.label+": "+g.meal+"</div>";
      var lines=g.ings.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      lines.forEach(function(line,li){
        var k='mi_'+gi+'_'+li;
        var chk=superData.menuChecked&&superData.menuChecked[k];
        html+="<div class='super-item"+(chk?' checked':'')+"' onclick='toggleMenuIng(\""+k+"\")'><span class='super-cb'>"+(chk?'&#10003;':'')+"</span><span class='super-ing-text'>"+line+"</span></div>";
      });
      html+="</div>";
    });
  } else {
    html+="<div class='empty' style='padding:16px 0'>Agrega ingredientes a las comidas del menú para verlos aquí.</div>";
  }
  html+="<div class='section-lbl'>📝 Requisiciones extras</div>";
  html+="<div class='super-add-row'><input type='text' id='super-new-item' placeholder='Agregar producto...' onkeydown='if(event.key===\"Enter\")addSuperItem()'><button class='super-add-btn' onclick='addSuperItem()'>+</button></div>";
  var pending=items.filter(function(i){return!i.checked;});
  var done=items.filter(function(i){return i.checked;});
  if(!pending.length&&!done.length)html+="<div class='empty' style='padding:8px 0;font-size:.82rem'>Sin requisiciones aún.</div>";
  pending.forEach(function(item){
    html+="<div class='super-item'><span class='super-cb' onclick='toggleSuperItem(\""+item.id+"\")'></span><span class='super-req-text'>"+item.text+"</span><span class='super-by'>"+item.addedBy+"</span><button class='super-del' onclick='deleteSuperItem(\""+item.id+"\")'>&#128465;</button></div>";
  });
  if(done.length){
    html+="<div class='section-lbl' style='font-size:.72rem;opacity:.6;margin-top:16px'>&#10003; Ya en el carrito ("+done.length+")</div>";
    done.forEach(function(item){
      html+="<div class='super-item checked'><span class='super-cb' onclick='toggleSuperItem(\""+item.id+"\")'>&#10003;</span><span class='super-req-text'>"+item.text+"</span><span class='super-by'>"+item.addedBy+"</span><button class='super-del' onclick='deleteSuperItem(\""+item.id+"\")'>&#128465;</button></div>";
    });
    html+="<button class='super-clear-btn' onclick='clearCheckedSuper()'>&#128465; Limpiar comprados</button>";
  }
  document.getElementById('super-body').innerHTML=html;
}
function addSuperItem(){
  var el=document.getElementById('super-new-item');
  if(!el)return;
  var text=el.value.trim();
  if(!text){toast('Escribe qué necesitas');return;}
  var superData=DB.super(S.fam.id);
  superData.items=superData.items||[];
  superData.items.push({id:'si_'+Date.now(),text:text,addedBy:S.role||S.fam.name,checked:false});
  DB.saveSuper(S.fam.id,superData);
  el.value='';
  renderSuperTab();
  toast('✅ Agregado');
}
function addCookSuperItem(){
  var el=document.getElementById('cook-super-input');
  if(!el)return;
  var text=el.value.trim();
  if(!text){toast('Escribe qué necesitas');return;}
  var superData=DB.super(S.fam.id);
  superData.items=superData.items||[];
  superData.items.push({id:'si_'+Date.now(),text:text,addedBy:'Elena',checked:false});
  DB.saveSuper(S.fam.id,superData);
  el.value='';
  renderCocinera();
  toast('✅ Agregado a la lista del super');
}
function toggleMenuIng(key){
  var superData=DB.super(S.fam.id);
  if(!superData.menuChecked)superData.menuChecked={};
  superData.menuChecked[key]=!superData.menuChecked[key];
  DB.saveSuper(S.fam.id,superData);
  renderSuperTab();
}
function toggleSuperItem(id){
  var superData=DB.super(S.fam.id);
  var item=(superData.items||[]).find(function(i){return i.id===id;});
  if(item)item.checked=!item.checked;
  DB.saveSuper(S.fam.id,superData);
  renderSuperTab();
}
function deleteSuperItem(id){
  var superData=DB.super(S.fam.id);
  superData.items=(superData.items||[]).filter(function(i){return i.id!==id;});
  DB.saveSuper(S.fam.id,superData);
  renderSuperTab();
}
function clearCheckedSuper(){
  var superData=DB.super(S.fam.id);
  superData.items=(superData.items||[]).filter(function(i){return!i.checked;});
  DB.saveSuper(S.fam.id,superData);
  renderSuperTab();
  toast('&#128465; Lista limpiada');
}
